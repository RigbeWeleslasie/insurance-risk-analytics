name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8 (errors only)
        run: |
          flake8 src/ tests/ \
            --count --select=E9,F63,F7,F82 \
            --show-source --statistics

      - name: Lint with flake8 (style warnings)
        run: |
          flake8 src/ tests/ \
            --count --exit-zero \
            --max-complexity=10 \
            --max-line-length=120 \
            --statistics

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short
